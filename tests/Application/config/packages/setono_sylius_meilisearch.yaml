parameters:
    # Fallbacks so the container can boot without Dotenv (e.g. PHPStan's kernel loaders)
    env(MEILISEARCH_URL): 'http://127.0.0.1:7700'
    env(MEILISEARCH_MASTER_KEY): ''
    env(MEILISEARCH_PREFIX): ''
    env(MEILISEARCH_SEARCH_KEY): ''

setono_sylius_meilisearch:
    indexes:
        products:
            document: 'Setono\SyliusMeilisearchPlugin\Tests\Application\Document\Product'
            entities: [ 'Setono\SyliusMeilisearchPlugin\Tests\Application\Entity\Product' ]
            prefix: '%env(MEILISEARCH_PREFIX)%'
            default_filters:
                stock_available: true
        taxons:
            document: 'Setono\SyliusMeilisearchPlugin\Document\Taxon'
            entities: [ 'Setono\SyliusMeilisearchPlugin\Tests\Application\Entity\Taxon' ]
            prefix: '%env(MEILISEARCH_PREFIX)%'
    search:
        index: products
        hits_per_page: 3
    autocomplete:
        indexes:
            - products

when@prod:
    setono_sylius_meilisearch:
        metadata:
            cache: true
